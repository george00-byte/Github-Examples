name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  hello_world:
    runs-on: ubuntu-latest
    steps:
      - name: Echo Basic Information
        run: |
          echo "Ref: $GITHUB_REF"
          echo "Job id: $GITHUB_JOB"
